<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karargah Girişi | Fatih Barış Akademi</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .login-body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .login-logo {
            font-size: 40px;
            color: #ff4500;
            margin-bottom: 10px;
        }
        .login-card h2 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .login-card p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            border-color: #ff4500;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: #ff4500;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .login-btn:hover {
            background: #e03d00;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <h2>Akademi Karargahı</h2>
        <p>Lütfen yönetici bilgilerinizi giriniz.</p>
        <form id="admin-login-form">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="login-email" placeholder="E-posta Adresi" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-password" placeholder="Yönetici Şifresi" required>
            </div>
            <button type="submit" class="login-btn">Giriş Yap</button>
        </form>
    </div>
    <script type="module" src="../scripts/myscript.js"></script>
</body>
</html>
